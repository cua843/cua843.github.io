<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒數計時</title>
    <link rel="icon" href="https://raw.githubusercontent.com/cua843/cua843.github.io/main/image/favicon.ico" type="image/x-icon"/> 
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #ECEFF4;
            
        }

        .countdown-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 100px auto;
            max-width: 500px;
            color: #5E81AC;
        }

        .countdown-header {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .countdown {
            font-size: 20px;
            width: 300px;
            height: 50px;
            line-height: 50px;
            padding: 10px;
            background: #4C566A;
            color: #ECEFF4;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="countdown-container">
        <h2 class="countdown-header">技優簡章公告</h2>
        <div id="countdown1" class="countdown"></div>

        <h2 class="countdown-header">統測倒數</h2>
        <div id="countdown2" class="countdown"></div>

        <h2 class="countdown-header">第二次模擬考倒數</h2>
        <div id="countdown3" class="countdown"></div>

        <h2 class="countdown-header">第二次段考倒數</h2>
        <div id="countdown4" class="countdown"></div>
        
        <h2 class="countdown-header">保送放榜倒數</h2>
        <div id="countdown5" class="countdown"></div>
    </div>

    <script>
        // 設定截止日期
        const deadline1 = new Date('2024-12-05 00:00:00');
        const deadline2 = new Date('2025-04-26 00:00:00');
        const deadline3 = new Date('2024-12-10 00:00:00');
        const deadline4 = new Date('2024-12-02 00:00:00');
        const deadline5 = new Date('2025-03-18 00:00:00');

        // 計算剩餘時間 (第一個計時器)
        function getTimeRemaining1() {
            const now = new Date();
            const diff = deadline1 - now;

            if (diff <= 0) {
                return '時間到了喔:D';
            }

            const seconds = Math.floor((diff / 1000) % 60);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            return `${days} 天 ${hours} 小時 ${minutes} 分鐘 ${seconds} 秒`;
        }

        // 更新第一個計時器
        function updateCountdown1() {
            const countdown1 = document.getElementById('countdown1');
            countdown1.textContent = getTimeRemaining1();

            setInterval(updateCountdown1, 1000);
        }

        // 計算剩餘時間 (第二個計時器)
        function getTimeRemaining2() {
            const now = new Date();
            const diff = deadline2 - now;

            if (diff <= 0) {
                return '時間到了喔:D';
            }

            const seconds = Math.floor((diff / 1000) % 60);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            return `${days} 天 ${hours} 小時 ${minutes} 分鐘 ${seconds} 秒`;
        }

        // 更新第二個計時器
        function updateCountdown2() {
            const countdown2 = document.getElementById('countdown2');
            countdown2.textContent = getTimeRemaining2();

            setInterval(updateCountdown2, 1000);
        }
        
        // 計算剩餘時間 (第三個計時器)
        function getTimeRemaining3() {
            const now = new Date();
            const diff = deadline3 - now;

            if (diff <= 0) {
                return '時間到了喔:D';
            }

            const seconds = Math.floor((diff / 1000) % 60);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            return `${days} 天 ${hours} 小時 ${minutes} 分鐘 ${seconds} 秒`;
        }

        // 更新第三個計時器
        function updateCountdown3() {
            const countdown3 = document.getElementById('countdown3');
            countdown3.textContent = getTimeRemaining3();

            setInterval(updateCountdown3, 1000);
        }

        // 計算剩餘時間 (第四個計時器)
        function getTimeRemaining4() {
            const now = new Date();
            const diff = deadline4 - now;

            if (diff <= 0) {
                return '時間到了喔:D';
            }

            const seconds = Math.floor((diff / 1000) % 60);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            return `${days} 天 ${hours} 小時 ${minutes} 分鐘 ${seconds} 秒`;
        }

        // 更新第四個計時器
        function updateCountdown4() {
            const countdown4 = document.getElementById('countdown4');
            countdown4.textContent = getTimeRemaining4();

            setInterval(updateCountdown4, 1000);
        }
// 計算剩餘時間 (第五個計時器)
        function getTimeRemaining5() {
            const now = new Date();
            const diff = deadline5 - now;

            if (diff <= 0) {
                return '時間到了喔:D';
            }

            const seconds = Math.floor((diff / 1000) % 60);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            return `${days} 天 ${hours} 小時 ${minutes} 分鐘 ${seconds} 秒`;
        }

        // 更新第五個計時器
        function updateCountdown5() {
            const countdown5 = document.getElementById('countdown5');
            countdown1.textContent = getTimeRemaining5();

            setInterval(updateCountdown5, 1000);
        }
        // 開始第一個計時器
        updateCountdown1();

        // 開始第二個計時器
        updateCountdown2();
        
        // 開始第三個計時器
        updateCountdown3();

        // 開始第四個計時器
        updateCountdown4();

        // 開始第五個計時器
        updateCountdown5();
    </script>
</body>
</html>
